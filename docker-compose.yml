services:
  docagent-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docagent-web
    env_file:
      - .env
    environment:
      DOCS_DIR: doc
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./doc:/app/doc:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
